<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="900" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#166534">🌿 Circuito Terê Verde — Arquitetura &amp; Fluxo de Navegação</text>

  <!-- ===== ARCHITECTURE SECTION ===== -->
  <rect x="30" y="55" width="1140" height="180" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="600" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Arquitetura do Sistema</text>

  <!-- PWA Client -->
  <rect x="60" y="95" width="250" height="125" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="185" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">📱 PWA (Cliente)</text>
  <line x1="80" y1="125" x2="290" y2="125" stroke="#bfdbfe" stroke-width="1"/>
  <text x="80" y="143" font-size="10" fill="#1e3a5f">React 19 + Vite 7</text>
  <text x="80" y="158" font-size="10" fill="#1e3a5f">Tailwind CSS 4</text>
  <text x="80" y="173" font-size="10" fill="#1e3a5f">React Router (SPA)</text>
  <text x="80" y="188" font-size="10" fill="#1e3a5f">Axios + JWT auto-refresh</text>
  <text x="80" y="203" font-size="10" fill="#1e3a5f">Leaflet (mapas)</text>
  <text x="80" y="218" font-size="10" fill="#1e3a5f">Service Worker (offline)</text>

  <!-- Arrow PWA → Backend -->
  <line x1="310" y1="155" x2="430" y2="155" stroke="#166534" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="370" y="148" text-anchor="middle" font-size="9" fill="#166534">REST API</text>
  <text x="370" y="168" text-anchor="middle" font-size="9" fill="#166534">/api/*</text>

  <!-- Backend -->
  <rect x="430" y="95" width="300" height="125" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="580" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">⚙️ Backend (API)</text>
  <line x1="450" y1="125" x2="710" y2="125" stroke="#bbf7d0" stroke-width="1"/>
  <text x="450" y="143" font-size="10" fill="#14532d">Django 4.2 + DRF</text>
  <text x="450" y="158" font-size="10" fill="#14532d">SimpleJWT (autenticação)</text>
  <text x="450" y="173" font-size="10" fill="#14532d">django-filter (filtros)</text>
  <text x="450" y="188" font-size="10" fill="#14532d">WhiteNoise (static files)</text>
  <text x="450" y="203" font-size="10" fill="#14532d">Gunicorn (WSGI prod)</text>
  <text x="450" y="218" font-size="10" fill="#14532d">CORS headers</text>

  <!-- Arrow Backend → DB -->
  <line x1="730" y1="155" x2="830" y2="155" stroke="#166534" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="780" y="148" text-anchor="middle" font-size="9" fill="#166534">ORM</text>

  <!-- Database -->
  <rect x="830" y="110" width="160" height="80" rx="10" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="910" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">🗄️ SQLite</text>
  <text x="910" y="158" text-anchor="middle" font-size="10" fill="#92400e">Parques, Trilhas</text>
  <text x="910" y="173" text-anchor="middle" font-size="10" fill="#92400e">Eventos, Bio, Users</text>

  <!-- Deploy -->
  <rect x="1020" y="95" width="130" height="125" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1085" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b21a8">☁️ Deploy</text>
  <line x1="1035" y1="125" x2="1135" y2="125" stroke="#ddd6fe" stroke-width="1"/>
  <text x="1040" y="143" font-size="10" fill="#581c87">Render</text>
  <text x="1040" y="158" font-size="10" fill="#581c87">Python 3.12</text>
  <text x="1040" y="173" font-size="10" fill="#581c87">Node 22</text>
  <text x="1040" y="188" font-size="10" fill="#581c87">build.sh auto</text>
  <text x="1040" y="203" font-size="10" fill="#581c87">HTTPS grátis</text>

  <!-- ===== NAVIGATION FLOW ===== -->
  <rect x="30" y="250" width="1140" height="310" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="273" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Fluxo de Navegação — Frontend (PWA)</text>

  <!-- HOME -->
  <rect x="460" y="290" width="180" height="50" rx="10" fill="#166534" stroke="#14532d" stroke-width="2"/>
  <text x="550" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🏠 Home /</text>

  <!-- Lines from Home -->
  <line x1="480" y1="340" x2="130" y2="390" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="500" y1="340" x2="320" y2="390" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="550" y1="340" x2="550" y2="390" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="590" y1="340" x2="730" y2="390" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="610" y1="340" x2="920" y2="390" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="630" y1="340" x2="1080" y2="390" stroke="#166534" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Parques -->
  <rect x="50" y="390" width="150" height="45" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="125" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🏞️ Parques</text>
  <text x="125" y="427" text-anchor="middle" font-size="9" fill="#dcfce7">/parques/:id</text>

  <!-- Trilhas -->
  <rect x="240" y="390" width="150" height="45" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="315" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🥾 Trilhas</text>
  <text x="315" y="427" text-anchor="middle" font-size="9" fill="#dcfce7">/trilhas</text>

  <!-- Mapa -->
  <rect x="470" y="390" width="150" height="45" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
  <text x="545" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🗺️ Mapa</text>
  <text x="545" y="427" text-anchor="middle" font-size="9" fill="#dbeafe">/mapa</text>

  <!-- Eventos -->
  <rect x="660" y="390" width="150" height="45" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="735" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="white">📅 Eventos</text>
  <text x="735" y="427" text-anchor="middle" font-size="9" fill="#dcfce7">/eventos</text>

  <!-- Biodiversidade -->
  <rect x="845" y="390" width="155" height="45" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="922" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🐾 Biodiversidade</text>
  <text x="922" y="427" text-anchor="middle" font-size="9" fill="#fef3c7">/bio</text>

  <!-- Educação -->
  <rect x="1020" y="390" width="140" height="45" rx="8" fill="#166534" stroke="#14532d" stroke-width="1.5"/>
  <text x="1090" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🌍 Educação</text>
  <text x="1090" y="427" text-anchor="middle" font-size="9" fill="#dcfce7">/educacao</text>

  <!-- Trilha Detalhe -->
  <line x1="315" y1="435" x2="315" y2="475" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="545" y1="435" x2="370" y2="475" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <line x1="125" y1="435" x2="270" y2="475" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <rect x="225" y="475" width="180" height="45" rx="8" fill="#15803d" stroke="#166534" stroke-width="1.5"/>
  <text x="315" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="white">📋 Detalhe Trilha</text>
  <text x="315" y="512" text-anchor="middle" font-size="9" fill="#dcfce7">/trilhas/:id</text>

  <!-- Features do Detalhe -->
  <line x1="270" y1="520" x2="130" y2="540" stroke="#15803d" stroke-width="1" marker-end="url(#arrowGreen)"/>
  <line x1="315" y1="520" x2="315" y2="540" stroke="#15803d" stroke-width="1" marker-end="url(#arrowGreen)"/>
  <line x1="360" y1="520" x2="500" y2="540" stroke="#15803d" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <rect x="60" y="540" width="120" height="30" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="120" y="560" text-anchor="middle" font-size="10" fill="#374151">⭐ Comentários</text>

  <rect x="250" y="540" width="120" height="30" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="310" y="560" text-anchor="middle" font-size="10" fill="#374151">❤️ Favoritos</text>

  <rect x="440" y="540" width="130" height="30" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="505" y="560" text-anchor="middle" font-size="10" fill="#374151">📍 Google Maps</text>

  <!-- Filtros box -->
  <rect x="660" y="460" width="290" height="110" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="805" y="480" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">🔍 Filtros (Trilhas)</text>
  <text x="675" y="498" font-size="10" fill="#6b7280">🔤 Busca textual</text>
  <text x="675" y="514" font-size="10" fill="#6b7280">⚡ Dificuldade (4 níveis)</text>
  <text x="675" y="530" font-size="10" fill="#6b7280">💧 Tipo (trilha/cachoeira/mirante)</text>
  <text x="675" y="546" font-size="10" fill="#6b7280">📏 Ordenação (distância/nome)</text>
  <text x="675" y="562" font-size="10" fill="#6b7280">📄 Paginação (10/página)</text>

  <!-- ===== AUTH + PWA SECTION ===== -->
  <!-- Auth -->
  <rect x="30" y="590" width="520" height="130" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="290" y="613" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">🔐 Autenticação (JWT)</text>
  <line x1="50" y1="622" x2="530" y2="622" stroke="#fecaca" stroke-width="1"/>

  <rect x="55" y="635" width="100" height="35" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
  <text x="105" y="657" text-anchor="middle" font-size="10" font-weight="bold" fill="white">/login</text>

  <line x1="155" y1="652" x2="180" y2="652" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="180" y="635" width="110" height="35" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="235" y="650" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">POST /api/token/</text>
  <text x="235" y="663" text-anchor="middle" font-size="9" fill="#b91c1c">→ access + refresh</text>

  <line x1="290" y1="652" x2="315" y2="652" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="315" y="635" width="100" height="35" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="365" y="650" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">Favoritos</text>
  <text x="365" y="663" text-anchor="middle" font-size="9" fill="#991b1b">Comentários</text>

  <line x1="415" y1="652" x2="440" y2="652" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="440" y="635" width="90" height="35" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="485" y="657" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">Django Admin</text>

  <text x="55" y="700" font-size="10" fill="#991b1b">Admin → /admin/ → CRUD completo de Parques, Trilhas, Eventos, Biodiversidade</text>

  <!-- PWA -->
  <rect x="580" y="590" width="590" height="130" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="875" y="613" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">📱 PWA — Progressive Web App</text>
  <line x1="600" y1="622" x2="1150" y2="622" stroke="#bfdbfe" stroke-width="1"/>

  <text x="610" y="642" font-size="10" fill="#1e3a5f">✅ Instalável no celular (Adicionar à tela inicial)</text>
  <text x="610" y="659" font-size="10" fill="#1e3a5f">✅ Funciona offline (Service Worker + Cache API)</text>
  <text x="610" y="676" font-size="10" fill="#1e3a5f">✅ Bottom tabs mobile / Top nav desktop</text>
  <text x="610" y="693" font-size="10" fill="#1e3a5f">✅ Tela cheia (standalone mode, sem barra do browser)</text>
  <text x="610" y="710" font-size="10" fill="#1e3a5f">✅ Safe areas (notch, barra de navegação)</text>

  <text x="900" y="642" font-size="10" fill="#1e3a5f">✅ Manifest.json + ícones SVG</text>
  <text x="900" y="659" font-size="10" fill="#1e3a5f">✅ Cache: static first, API network first</text>
  <text x="900" y="676" font-size="10" fill="#1e3a5f">✅ Bundle: 456KB JS (143KB gzip)</text>
  <text x="900" y="693" font-size="10" fill="#1e3a5f">✅ Imagens otimizadas (~1.2MB total)</text>
  <text x="900" y="710" font-size="10" fill="#1e3a5f">✅ Deploy: Render free tier</text>

  <!-- ===== API ENDPOINTS ===== -->
  <rect x="30" y="740" width="1140" height="145" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="763" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">🔌 API Endpoints — Backend Django REST Framework</text>

  <!-- Public -->
  <rect x="50" y="775" width="530" height="100" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="315" y="795" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Públicos (sem auth)</text>
  <text x="65" y="815" font-size="10" fill="#374151">GET /api/parques/           → Lista parques + trilhas nested</text>
  <text x="65" y="832" font-size="10" fill="#374151">GET /api/trilhas/            → Lista com filtros (dificuldade, tipo, search)</text>
  <text x="65" y="849" font-size="10" fill="#374151">GET /api/trilhas/mapa/    → GeoJSON com coordenadas GPS</text>
  <text x="65" y="866" font-size="10" fill="#374151">GET /api/eventos/           → Eventos programados</text>

  <!-- Authenticated -->
  <rect x="610" y="775" width="540" height="100" rx="8" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="880" y="795" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Autenticados (JWT Bearer)</text>
  <text x="625" y="815" font-size="10" fill="#374151">POST /api/token/              → Login (username + password)</text>
  <text x="625" y="832" font-size="10" fill="#374151">POST /api/token/refresh/  → Renovar access token</text>
  <text x="625" y="849" font-size="10" fill="#374151">GET|POST|DEL /api/favoritos/      → CRUD favoritos</text>
  <text x="625" y="866" font-size="10" fill="#374151">GET|POST|DEL /api/comentarios/ → CRUD comentários</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#166534"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
