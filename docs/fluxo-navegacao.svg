<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="750" rx="16" fill="#f0fdf4"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#166534">🌿 Circuito Terê Verde — Fluxo de Navegação</text>

  <!-- ===== HOME ===== -->
  <rect x="400" y="70" width="200" height="60" rx="12" fill="#166534" stroke="#14532d" stroke-width="2"/>
  <text x="500" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🏠 Home</text>

  <!-- Lines from Home -->
  <line x1="430" y1="130" x2="150" y2="200" stroke="#166534" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="130" x2="370" y2="200" stroke="#166534" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="130" x2="500" y2="200" stroke="#166534" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="130" x2="650" y2="200" stroke="#166534" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="130" x2="830" y2="200" stroke="#166534" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="130" x2="990" y2="200" stroke="#166534" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PARQUES ===== -->
  <rect x="50" y="200" width="180" height="55" rx="10" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="140" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🏞️ Parques</text>
  <text x="140" y="243" text-anchor="middle" font-size="10" fill="#dcfce7">/parques/:id</text>

  <!-- ===== TRILHAS ===== -->
  <rect x="280" y="200" width="180" height="55" rx="10" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="370" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🥾 Trilhas</text>
  <text x="370" y="243" text-anchor="middle" font-size="10" fill="#dcfce7">/trilhas</text>

  <!-- ===== MAPA ===== -->
  <rect x="420" y="200" width="160" height="55" rx="10" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
  <text x="500" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🗺️ Mapa</text>
  <text x="500" y="243" text-anchor="middle" font-size="10" fill="#dbeafe">/mapa</text>

  <!-- ===== EVENTOS ===== -->
  <rect x="570" y="200" width="160" height="55" rx="10" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="650" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📅 Eventos</text>
  <text x="650" y="243" text-anchor="middle" font-size="10" fill="#dcfce7">/eventos</text>

  <!-- ===== BIODIVERSIDADE ===== -->
  <rect x="740" y="200" width="180" height="55" rx="10" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="830" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🐾 Biodiversidade</text>
  <text x="830" y="243" text-anchor="middle" font-size="10" fill="#fef3c7">/bio</text>

  <!-- ===== EDUCAÇÃO ===== -->
  <rect x="910" y="200" width="160" height="55" rx="10" fill="#166534" stroke="#14532d" stroke-width="1.5"/>
  <text x="990" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🌍 Educação</text>
  <text x="990" y="243" text-anchor="middle" font-size="10" fill="#dcfce7">/educacao</text>

  <!-- ===== TRILHA DETALHE ===== -->
  <line x1="370" y1="255" x2="370" y2="320" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="255" x2="430" y2="320" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="140" y1="255" x2="310" y2="320" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <rect x="270" y="320" width="200" height="55" rx="10" fill="#15803d" stroke="#166534" stroke-width="1.5"/>
  <text x="370" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📋 Detalhe Trilha</text>
  <text x="370" y="363" text-anchor="middle" font-size="10" fill="#dcfce7">/trilhas/:id</text>

  <!-- ===== FEATURES DO DETALHE ===== -->
  <line x1="310" y1="375" x2="150" y2="440" stroke="#15803d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="375" x2="370" y2="440" stroke="#15803d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="375" x2="590" y2="440" stroke="#15803d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Comentários -->
  <rect x="60" y="440" width="170" height="50" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="145" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">⭐ Comentários</text>
  <text x="145" y="478" text-anchor="middle" font-size="10" fill="#9ca3af">Notas 1-5 estrelas</text>

  <!-- Favoritos -->
  <rect x="280" y="440" width="170" height="50" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="365" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">❤️ Favoritos</text>
  <text x="365" y="478" text-anchor="middle" font-size="10" fill="#9ca3af">Requer login</text>

  <!-- Google Maps -->
  <rect x="500" y="440" width="170" height="50" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="585" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">📍 Google Maps</text>
  <text x="585" y="478" text-anchor="middle" font-size="10" fill="#9ca3af">Link externo GPS</text>

  <!-- ===== FILTROS (Trilhas) ===== -->
  <rect x="700" y="320" width="340" height="170" rx="10" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="870" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">🔍 Filtros da Lista de Trilhas</text>
  <line x1="720" y1="355" x2="1020" y2="355" stroke="#e5e7eb" stroke-width="1"/>
  <text x="720" y="378" font-size="11" fill="#6b7280">🔤 Busca textual (nome, parque)</text>
  <text x="720" y="398" font-size="11" fill="#6b7280">⚡ Dificuldade (Fácil → Muito Difícil)</text>
  <text x="720" y="418" font-size="11" fill="#6b7280">💧 Tipo (Trilha, Cachoeira, Mirante)</text>
  <text x="720" y="438" font-size="11" fill="#6b7280">📏 Ordenação (distância, nome, recentes)</text>
  <text x="720" y="458" font-size="11" fill="#6b7280">🟢 Status (aberta / fechada)</text>
  <text x="720" y="478" font-size="11" fill="#6b7280">📄 Paginação automática (10/página)</text>

  <!-- ===== AUTH FLOW ===== -->
  <rect x="60" y="560" width="450" height="160" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="285" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">🔐 Fluxo de Autenticação</text>
  <line x1="80" y1="598" x2="490" y2="598" stroke="#fecaca" stroke-width="1"/>

  <!-- Login box -->
  <rect x="80" y="610" width="120" height="40" rx="8" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
  <text x="140" y="635" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Login /login</text>

  <line x1="200" y1="630" x2="230" y2="630" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- JWT box -->
  <rect x="230" y="610" width="100" height="40" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="280" y="628" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">JWT Token</text>
  <text x="280" y="642" text-anchor="middle" font-size="9" fill="#b91c1c">access+refresh</text>

  <line x1="330" y1="630" x2="360" y2="630" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Features box -->
  <rect x="360" y="610" width="130" height="40" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="425" y="628" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Favoritos</text>
  <text x="425" y="642" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Comentários</text>

  <!-- Admin -->
  <rect x="80" y="660" width="410" height="40" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="285" y="685" text-anchor="middle" font-size="11" fill="#991b1b">Admin → Django Admin (/admin/) → CRUD Parques, Trilhas, Eventos, Bio</text>

  <!-- ===== PWA INFO ===== -->
  <rect x="550" y="560" width="500" height="160" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="800" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">📱 PWA — Progressive Web App</text>
  <line x1="570" y1="598" x2="1030" y2="598" stroke="#bfdbfe" stroke-width="1"/>

  <text x="580" y="620" font-size="11" fill="#1e3a5f">✅ Instalável no celular (Adicionar à tela inicial)</text>
  <text x="580" y="640" font-size="11" fill="#1e3a5f">✅ Funciona offline (Service Worker + Cache)</text>
  <text x="580" y="660" font-size="11" fill="#1e3a5f">✅ Bottom tabs no mobile (navegação nativa)</text>
  <text x="580" y="680" font-size="11" fill="#1e3a5f">✅ Top navbar no desktop (responsivo)</text>
  <text x="580" y="700" font-size="11" fill="#1e3a5f">✅ Safe areas (notch, barra de navegação)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
