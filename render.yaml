services:
  - type: web
    name: circuito-tere-verde
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn circuito_tere_verde.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "22.14.0"
